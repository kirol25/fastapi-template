services:
  db:
    image: postgres:latest
    container_name: postgres-db
    ports:
      - "5432:5432"
    restart: always
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    networks:
      - backend-network

  backend:
    image: fastapi-template:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    command: gunicorn --bind 0.0.0.0:8080 main:app -k uvicorn.workers.UvicornWorker
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - backend-network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    networks:
      - backend-network

  # https://github.com/grafana/docker-otel-lgtm/
  grafana:
    image: grafana/otel-lgtm
    container_name: grafana
    stdin_open: true
    tty: true
    restart: always
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    networks:
      - backend-network

volumes:
  postgres-data:

networks:
  backend-network:
    name: backend-network
    driver: bridge
