events {
    worker_connections  1024;  ## Default: 1024
}

http {
  server {
      listen 80 default_server;
      server_name localhost;

      location / {
          proxy_pass http://backend:8080/;  # Proxy requests to the Streamlit app
          proxy_http_version 1.1;  # Use HTTP/1.1 to ensure support for WebSocket connections
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Forward the original client's IP
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header Host $host;  # Forward the original Host header
          proxy_read_timeout 86400;  # Set a high timeout to keep WebSocket connections open
  }

      access_log /var/log/nginx/access.log;
      error_log /var/log/nginx/error.log;
  }
}
